{% extends "base.html" %}

{% block content %}

<div class="grid lg:grid-cols-[2fr,1fr] gap-4 container">

    <div class="cell-margin text lg:m-16 flex flex-col items-center gap-8">
        <div class="introduction_headings huge-title">
            <a href="/introduction"
                hx-target="#modal-content"
                hx-select="main"
                hx-swap="innerHTML"
                @click="openModal()">
                Introduction
            </a>
        </div>
        <div class="introduction_headings huge-title">
            <a href="/governance"
                hx-target="#modal-content"
                hx-select="main"
                hx-swap="innerHTML"
                @click="openModal()">
                Governance
            </a>
        </div>
    </div>

    <div id="colophon" class="cell-margin text lg:my-16">
        {{ sidebar_text | safe }}

        {% if last_updated is defined %}
            <hr>
            Database last updated: {{ last_updated[0:10] }}
        {% endif %}
    </div>
</div>

{% endblock %}
